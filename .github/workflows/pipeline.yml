name: Mon Premier Pipeline CI/CD

# 1. Quand est-ce que le pipeline se déclenche ?
on:
  push:
    branches: [ "main" ] # À chaque fois qu'on envoie du code sur 'main'

# On force les plugins de GitHub à utiliser Node 24
env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

# 2. Que doit faire le pipeline ?
jobs:
  # ----------------------------------------
  # PARTIE 1 : INTEGRATION CONTINUE (CI)
  # ----------------------------------------
  tester-le-code:
    # On demande à GitHub de nous prêter un petit serveur Ubuntu
    runs-on: ubuntu-latest

    # 3. Les étapes à suivre sur ce serveur
    steps:
      # Étape A : Télécharger notre code depuis GitHub vers le serveur Ubuntu
      - name: Récupérer le code
        uses: actions/checkout@v4

      # Étape B : Installer Node.js sur le serveur
      - name: Installer Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'

      # Étape C : Lancer notre fameux test !
      - name: Lancer le test
        run: npm test

  # ----------------------------------------
  # PARTIE 2 : DÉPLOIEMENT CONTINU (CD)
  # ----------------------------------------
  deployer-en-production:
    needs: tester-le-code # 🚨 C'est ici que la magie opère : ce job attend que le test réussisse !
    runs-on: ubuntu-latest
    
    steps:
      - name: Simulation du déploiement
        # Le symbole | permet d'écrire plusieurs lignes de commandes d'un coup
        run: | 
          echo "✅ Tests validés par le job précédent !"
          echo "🚀 Connexion au serveur de production..."
          echo "📦 Envoi du code en cours..."
          echo "🌐 Succès : L'application est en ligne !"